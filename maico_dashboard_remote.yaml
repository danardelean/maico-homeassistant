  - title: Sensori
    path: sensors
    icon: mdi:chart-line
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Grafici Sensori
            icon: mdi:chart-line

          - type: custom:plotly-graph
            title: Temperatura (°C)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.albero_temperature
                name: Albero
                line:
                  width: 1.5
                  color: "#e74c3c"
              - entity: sensor.alcova_temperature
                name: Alcova
                line:
                  width: 1.5
                  color: "#ff9800"
              - entity: sensor.grotta_temperature
                name: Grotta
                line:
                  width: 1.5
                  color: "#4caf50"
              - entity: sensor.mastro_temperature
                name: Mastro
                line:
                  width: 1.5
                  color: "#2196f3"
            layout:
              height: 250
              yaxis:
                title: "°C"
              xaxis:
                rangeslider:
                  visible: true

          - type: custom:plotly-graph
            title: Umidità (%)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.albero_humidity
                name: Albero
                line:
                  width: 1.5
                  color: "#e74c3c"
              - entity: sensor.alcova_humidity
                name: Alcova
                line:
                  width: 1.5
                  color: "#ff9800"
              - entity: sensor.grotta_humidity
                name: Grotta
                line:
                  width: 1.5
                  color: "#4caf50"
              - entity: sensor.mastro_humidity
                name: Mastro
                line:
                  width: 1.5
                  color: "#2196f3"
            layout:
              height: 250
              yaxis:
                title: "%"
              xaxis:
                rangeslider:
                  visible: true

          - type: custom:plotly-graph
            title: Flusso aria (RPM)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.albero_air_flow
                name: Albero
                line:
                  width: 1.5
                  color: "#e74c3c"
              - entity: sensor.alcova_air_flow
                name: Alcova
                line:
                  width: 1.5
                  color: "#ff9800"
              - entity: sensor.grotta_air_flow
                name: Grotta
                line:
                  width: 1.5
                  color: "#4caf50"
              - entity: sensor.mastro_air_flow
                name: Mastro
                line:
                  width: 1.5
                  color: "#2196f3"
            layout:
              height: 250
              yaxis:
                title: RPM
              xaxis:
                rangeslider:
                  visible: true

  - title: Impostazioni
    path: settings
    icon: mdi:cog
    type: sections
    sections:
      - type: grid
        title: ""
        cards:
          - type: custom:mushroom-title-card
            title: Impostazioni Dispositivi
            subtitle: Configurazione e manutenzione
            icon: mdi:cog

      - type: grid
        title: ""
        cards:
          # ── Albero ──
          - type: vertical-stack
            cards:
              - type: custom:mushroom-title-card
                title: Albero
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: tile
                    entity: number.albero_led_brightness
                    name: LED
                    icon: mdi:led-on
                  - type: tile
                    entity: number.albero_humidity_threshold
                    name: Soglia umidità
                    icon: mdi:water-percent-alert
                  - type: tile
                    entity: switch.albero_air_quality_threshold
                    name: Soglia AQ
                    icon: mdi:air-purifier
                  - type: tile
                    entity: number.albero_night_mode_speed
                    name: Velocita notte
                    icon: mdi:fan-chevron-down
                  - type: tile
                    entity: number.albero_boost_duration
                    name: Durata boost
                    icon: mdi:timer
                  - type: tile
                    entity: number.albero_sleep_duration
                    name: Durata notte
                    icon: mdi:timer-outline
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: binary_sensor.albero_filter_warning
                    icon: mdi:air-filter
                    content: Pulisci Filtro
                    icon_color: "{{ 'red' if is_state('binary_sensor.albero_filter_warning', 'on') else 'green' }}"
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.albero_clear_filter
                      confirmation:
                        text: "Sei sicuro di voler resettare il contatore del filtro di Albero?"
                  - type: template
                    icon: mdi:restart
                    content: Riavvia il dispositivo
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.albero_reboot_the_device
                      confirmation:
                        text: "Sei sicuro di voler riavviare il dispositivo Albero?"

