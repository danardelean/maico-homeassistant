                alignment: center
                chips:
                  - type: template
                    entity: binary_sensor.mastro_filter_warning
                    icon: mdi:air-filter
                    content: Pulisci Filtro
                    icon_color: "{{ 'red' if is_state('binary_sensor.mastro_filter_warning', 'on') else 'green' }}"
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.mastro_clear_filter
                      confirmation:
                        text: "Sei sicuro di voler resettare il contatore del filtro di Mastro?"
                  - type: template
                    icon: mdi:restart
                    content: Riavvia il dispositivo
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.mastro_reboot_the_device
                      confirmation:
                        text: "Sei sicuro di voler riavviare il dispositivo Mastro?"
