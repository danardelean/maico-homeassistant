views:
  - title: Overview
    path: overview
    icon: mdi:air-purifier
    type: sections
    sections:
      - type: grid
        title: ""
        cards:
          - type: custom:mushroom-title-card
            title: Ventilazione Maico REC DUO
            subtitle: Controllo VMC
            icon: mdi:hvac

      - type: grid
        title: ""
        cards:
          # ── Albero ──
          - type: vertical-stack
            cards:
              - type: custom:mushroom-template-card
                entity: fan.albero_ventilation
                primary: Albero
                secondary: "⚡{{ ((state_attr('fan.albero_ventilation','percentage') | int(0)) * 15 / 100) | round(0) | int + 1 }}/16 · 🌡{{ states('sensor.albero_temperature') }}°C · 💧{{ states('sensor.albero_humidity') }}%"
                icon: mdi:fan
                icon_color: "{{ 'green' if is_state('fan.albero_ventilation', 'on') else 'grey' }}"
                tap_action:
                  action: more-info
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: fan.albero_ventilation
                    icon: mdi:power
                    icon_color: "{{ 'green' if is_state('fan.albero_ventilation', 'on') else 'red' }}"
                    content: "{{ 'Acceso' if is_state('fan.albero_ventilation', 'on') else 'Spento' }}"
                    tap_action:
                      action: call-service
                      service: fan.toggle
                      target:
                        entity_id: fan.albero_ventilation
                      confirmation:
                        text: "Sei sicuro di voler accendere/spegnere Albero?"
                  - type: template
                    entity: switch.vmc_stanza_albero
                    icon: mdi:power-plug
                    icon_color: "{{ 'green' if is_state('switch.vmc_stanza_albero', 'on') else 'red' }}"
                    content: "{{ 'Presa' if is_state('switch.vmc_stanza_albero', 'on') else 'Presa OFF' }}"
                    tap_action:
                      action: call-service
                      service: switch.toggle
                      target:
                        entity_id: switch.vmc_stanza_albero
                      confirmation:
                        text: "Sei sicuro di voler accendere/spegnere la presa VMC di Albero?"
                  - type: template
                    entity: select.albero_operating_mode
                    icon: mdi:hvac
                    content: "{{ states('sensor.albero') }}"
                  - type: template
                    entity: switch.albero_boost_mode
                    icon: mdi:fan-plus
                    icon_color: "{{ 'green' if is_state('switch.albero_boost_mode', 'on') else '' }}"
                    tap_action:
                      action: call-service
                      service: switch.toggle
                      target:
                        entity_id: switch.albero_boost_mode
                      confirmation:
                        text: "Sei sicuro di voler attivare/disattivare il boost di Albero?"
                  - type: template
                    entity: switch.albero_sleep_mode
                    icon: mdi:weather-night
                    icon_color: "{{ 'green' if is_state('switch.albero_sleep_mode', 'on') else '' }}"
                    tap_action:
                      action: call-service
                      service: switch.toggle
                      target:
                        entity_id: switch.albero_sleep_mode
                      confirmation:
                        text: "Sei sicuro di voler attivare/disattivare la modalità notte di Albero?"
                  - type: template
                    entity: binary_sensor.albero_online
                    icon: "{{ 'mdi:wifi' if is_state('binary_sensor.albero_online', 'on') else 'mdi:wifi-off' }}"
                    icon_color: "{{ 'green' if is_state('binary_sensor.albero_online', 'on') else 'red' }}"
                  - type: template
                    entity: binary_sensor.albero_filter_warning
                    icon: mdi:air-filter
                    icon_color: "{{ 'red' if is_state('binary_sensor.albero_filter_warning', 'on') else 'green' }}"
                    content: "{{ states('sensor.albero_filter_hours') }}"
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.albero_clear_filter
                      confirmation:
                        text: "Sei sicuro di voler resettare il contatore del filtro di Albero?"

